<!DOCTYPE html>
<html lang="ko">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>도형마스터</title>
  <!-- React 및 필수 도구 불러오기 -->
  <script src="https://unpkg.com/react@18/umd/react.development.js" crossorigin></script>
  <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js" crossorigin></script>
  <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
  <script src="https://cdn.tailwindcss.com"></script>
  
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Jua&display=swap');
    .font-jua { font-family: 'Jua', sans-serif !important; }
  </style>
</head>
<body class="bg-gradient-to-br from-teal-300 via-emerald-300 to-cyan-300 min-h-[100dvh] font-sans">
  <div id="root"></div>

  <script type="text/babel">
    const { useState, useEffect } = React;

    const isColinear = (p1, p2, p3) => {
      return (p2.y - p1.y) * (p3.x - p2.x) === (p3.y - p2.y) * (p2.x - p1.x);
    };

    const generateSymmetryProblem = () => {
      // 대각선(2, 3)을 제거하고 수직(0), 수평(1)만 출제
      const axisType = Math.floor(Math.random() * 2);
      let points = [];

      if (axisType === 0) {
        const axisPos = 5;
        let side = Math.random() < 0.5 ? 1 : -1;
        let startY = Math.floor(Math.random() * 3) + 1; // 1 ~ 3
        let height = Math.floor(Math.random() * 4) + 3; // 3 ~ 6
        let endY = startY + height;
        if (endY > 9) endY = 9;
        
        let w = (Math.floor(Math.random() * 3) + 2) * side; // 축으로부터의 너비
        let shapeType = Math.floor(Math.random() * 4); // 0: 삼각형, 1: 직사각형, 2: 사다리꼴, 3: 평행사변형 등
        
        points.push({ x: axisPos, y: startY });
        
        if (shapeType === 0) { // 삼각형 모양
            let midY = startY + Math.floor((endY - startY) / 2);
            points.push({ x: axisPos + w, y: midY });
        } else if (shapeType === 1) { // 직사각형 모양
            points.push({ x: axisPos + w, y: startY });
            points.push({ x: axisPos + w, y: endY });
        } else if (shapeType === 2) { // 사다리꼴 모양
            let topOffset = Math.floor(Math.random() * 2);
            let botOffset = Math.floor(Math.random() * 2);
            if (topOffset === 0 && botOffset === 0) {
                if (endY - startY > 3) botOffset = 1;
                else topOffset = 1;
            }
            points.push({ x: axisPos + w, y: startY + topOffset });
            points.push({ x: axisPos + w, y: endY - botOffset });
        } else { // 평행사변형/기타 다각형
            let offset = Math.floor(Math.random() * 2) + 1;
            points.push({ x: axisPos + w, y: startY + offset });
            points.push({ x: axisPos + w, y: endY });
        }
        
        points.push({ x: axisPos, y: endY });
        
      } else if (axisType === 1) { 
        const axisPos = 5; 
        let side = Math.random() < 0.5 ? 1 : -1;
        let startX = Math.floor(Math.random() * 3) + 1; // 1 ~ 3
        let width = Math.floor(Math.random() * 4) + 3; // 3 ~ 6
        let endX = startX + width;
        if (endX > 9) endX = 9;
        
        let h = (Math.floor(Math.random() * 3) + 2) * side; // 축으로부터의 높이
        let shapeType = Math.floor(Math.random() * 4);
        
        points.push({ x: startX, y: axisPos });
        
        if (shapeType === 0) { // 삼각형 모양
            let midX = startX + Math.floor((endX - startX) / 2);
            points.push({ x: midX, y: axisPos + h });
        } else if (shapeType === 1) { // 직사각형 모양
            points.push({ x: startX, y: axisPos + h });
            points.push({ x: endX, y: axisPos + h });
        } else if (shapeType === 2) { // 사다리꼴 모양
            let leftOffset = Math.floor(Math.random() * 2);
            let rightOffset = Math.floor(Math.random() * 2);
            if (leftOffset === 0 && rightOffset === 0) {
                if (endX - startX > 3) rightOffset = 1;
                else leftOffset = 1;
            }
            points.push({ x: startX + leftOffset, y: axisPos + h });
            points.push({ x: endX - rightOffset, y: axisPos + h });
        } else { // 평행사변형/기타 다각형
            let offset = Math.floor(Math.random() * 2) + 1;
            points.push({ x: startX + offset, y: axisPos + h });
            points.push({ x: endX, y: axisPos + h });
        }
        
        points.push({ x: endX, y: axisPos });
      }

      let cleanPoints = [points[0]];
      for(let i=1; i<points.length-1; i++) {
          if(!isColinear(cleanPoints[cleanPoints.length-1], points[i], points[i+1])) {
              cleanPoints.push(points[i]);
          }
      }
      cleanPoints.push(points[points.length-1]);
      
      let targetPoints = cleanPoints.map(p => {
           if(axisType === 0) return { x: 10 - p.x, y: p.y };
           if(axisType === 1) return { x: p.x, y: 10 - p.y };
      });

      let edges = new Set();
      for(let i=0; i<targetPoints.length-1; i++) {
          let p1 = targetPoints[i];
          let p2 = targetPoints[i+1];
          let edge = [p1.x+','+p1.y, p2.x+','+p2.y].sort().join('-');
          edges.add(edge);
      }

      return { axisType, points: cleanPoints, targetEdgesSet: Array.from(edges) };
    };

    function App() {
      const [score, setScore] = useState(0);
      const [combo, setCombo] = useState(0);
      const [problemCount, setProblemCount] = useState(0);
      const [level, setLevel] = useState(1);
      
      const [gameState, setGameState] = useState('playing'); 
      const [problem, setProblem] = useState(generateSymmetryProblem);
      const [userPath, setUserPath] = useState([]);
      const [feedback, setFeedback] = useState(null);
      const [nickname, setNickname] = useState('');
      
      const [leaderboard, setLeaderboard] = useState(() => {
        const saved = localStorage.getItem('geoGameLeaderboardFinal');
        return saved ? JSON.parse(saved) : [];
      });

      const resetGame = () => {
        setScore(0);
        setCombo(0);
        setProblemCount(0);
        setLevel(1);
        setGameState('playing');
        setProblem(generateSymmetryProblem());
        setUserPath([]);
        setFeedback(null);
      };

      const checkAnswer = () => {
        let userEdges = new Set();
        for(let i=0; i<userPath.length-1; i++) {
            let p1 = userPath[i];
            let p2 = userPath[i+1];
            let edge = [p1.x+','+p1.y, p2.x+','+p2.y].sort().join('-');
            userEdges.add(edge);
        }
        
        let isCorrect = false;
        if(userEdges.size > 0 && userEdges.size === problem.targetEdgesSet.length) {
             isCorrect = problem.targetEdgesSet.every(edge => userEdges.has(edge));
        }

        if (isCorrect) {
          const nextScore = score + 20 + (combo * 5);
          const nextCount = problemCount + 1;
          
          setScore(nextScore);
          setCombo(c => c + 1);
          setProblemCount(nextCount);
          setFeedback('correct');

          setTimeout(() => {
            if (nextCount > 0 && nextCount % 20 === 0) {
              setLevel(l => l + 1);
              setGameState('paused');
            } else {
              setProblem(generateSymmetryProblem());
            }
            setUserPath([]);
            setFeedback(null);
          }, 1000);
        } else {
          setFeedback('wrong');
          setCombo(0);
          setTimeout(() => setFeedback(null), 1000);
        }
      };

      const handleGridClick = (e) => {
        if(gameState !== 'playing' || feedback === 'correct') return;

        const svg = e.currentTarget;
        const pt = svg.createSVGPoint();
        pt.x = e.clientX;
        pt.y = e.clientY;
        const svgP = pt.matrixTransform(svg.getScreenCTM().inverse());
        
        const gridX = Math.round(svgP.x / 10);
        const gridY = Math.round(svgP.y / 10);
        
        if (gridX >= 0 && gridX <= 10 && gridY >= 0 && gridY <= 10) {
            setUserPath(prev => {
                if (prev.length > 0) {
                    const last = prev[prev.length - 1];
                    if (last.x === gridX && last.y === gridY) return prev;
                }
                return [...prev, { x: gridX, y: gridY }];
            });
        }
      };

      if (gameState === 'paused') return (
        <div className="flex flex-col items-center justify-center p-4 min-h-[100dvh] pb-24">
          <div className="bg-white/95 rounded-[2.5rem] shadow-2xl p-8 text-center max-w-sm w-full">
            <div className="text-6xl mb-4">✨</div>
            <h2 className="text-3xl font-black text-teal-600 mb-2">🎉 참 잘했어요!</h2>
            <p className="text-gray-600 mb-6 font-bold">{problemCount}문제를 멋지게 풀어냈어요!</p>
            
            <div className="bg-teal-50 p-6 rounded-3xl mb-6 space-y-3">
              <div className="flex justify-between font-bold text-lg">
                 <span className="text-gray-600">현재 점수</span>
                 <span className="text-teal-600 text-2xl">{score}점</span>
              </div>
              <div className="flex justify-between font-bold">
                 <span className="text-gray-500">최고 콤보</span>
                 <span className="text-orange-500">{combo} 연속</span>
              </div>
              <div className="flex justify-between font-bold">
                 <span className="text-gray-500">도달 레벨</span>
                 <span className="text-purple-600">Lv. {level}</span>
              </div>
            </div>

            <div className="space-y-3">
              <button onClick={() => { setGameState('playing'); setProblem(generateSymmetryProblem()); }} className="w-full bg-green-400 hover:bg-green-500 text-white p-4 rounded-2xl font-bold flex items-center justify-center gap-2 text-lg transition-colors">
                ▶️ 다음 레벨로 계속하기
              </button>
              <button onClick={() => setGameState('gameOver')} className="w-full bg-gray-200 hover:bg-gray-300 text-gray-700 p-4 rounded-2xl font-bold flex items-center justify-center gap-2 text-lg transition-colors">
                🚪 그만하고 순위 저장
              </button>
            </div>
          </div>
        </div>
      );

      if (gameState === 'gameOver') return (
        <div className="flex flex-col items-center justify-center p-4 min-h-[100dvh] pb-24">
          <div className="bg-white/95 rounded-[2.5rem] shadow-2xl p-8 text-center max-w-sm w-full">
            <div className="text-6xl mb-6">🏆</div>
            <h2 className="text-2xl font-black text-gray-800 mb-2">기록을 저장할까요?</h2>
            <p className="text-gray-500 mb-6">최종 점수: <strong className="text-teal-600 text-xl">{score}점</strong></p>
            <input 
              maxLength={8} 
              value={nickname} 
              onChange={(e) => setNickname(e.target.value)} 
              placeholder="이름 입력" 
              className="w-full p-4 mb-6 text-center text-xl font-bold border-[3px] border-teal-200 rounded-2xl outline-none focus:border-teal-400 transition-colors" 
            />
            <button onClick={() => {
                const newBoard = [...leaderboard, {id: Date.now(), name: nickname || '익명', score}]
                  .sort((a,b)=>b.score-a.score).slice(0,5);
                setLeaderboard(newBoard);
                localStorage.setItem('geoGameLeaderboardFinal', JSON.stringify(newBoard));
                setGameState('leaderboard');
            }} className="w-full bg-teal-500 text-white p-4 rounded-2xl font-bold hover:bg-teal-600 transition-colors">
              명예의 전당 등록
            </button>
          </div>
        </div>
      );

      if (gameState === 'leaderboard') return (
        <div className="flex flex-col items-center justify-center p-4 min-h-[100dvh] pb-24">
          <div className="bg-white/95 rounded-[2.5rem] shadow-2xl p-8 w-full max-w-sm">
            <h2 className="text-3xl font-black text-gray-800 text-center mb-8 font-sans">명예의 전당</h2>
            <div className="space-y-3 mb-8">
              {leaderboard.map((e, i) => (
                <div key={e.id} className="flex justify-between p-4 bg-white rounded-2xl font-bold border border-gray-100 shadow-sm">
                  <span className="text-gray-700">{i+1}. {e.name}</span>
                  <span className="text-teal-600">{e.score}점</span>
                </div>
              ))}
              {leaderboard.length === 0 && <div className="text-center text-gray-400 py-4 font-bold">아직 기록이 없어요!</div>}
            </div>
            <button onClick={resetGame} className="w-full bg-blue-500 text-white p-4 rounded-2xl font-bold hover:bg-blue-600 transition-colors">
              다시 시작하기
            </button>
          </div>
        </div>
      );

      return (
        <div className="flex flex-col items-center justify-start pt-5 px-4 pb-24 min-h-[100dvh] select-none">
          <h1 className="text-3xl md:text-4xl font-black text-white mb-5 flex items-center gap-2 drop-shadow-md font-jua">
            <div className="bg-white p-2 rounded-xl text-teal-600">
              <svg xmlns="http://www.w3.org/2000/svg" width="28" height="28" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="3" strokeLinecap="round" strokeLinejoin="round"><path d="M13.73 4a2 2 0 0 0-3.46 0l-8 14A2 2 0 0 0 4 21h16a2 2 0 0 0 1.73-3Z"/></svg>
            </div>
            도형마스터!
          </h1>

          <div className="bg-white/95 backdrop-blur-md rounded-[2.5rem] shadow-2xl p-4 md:p-6 w-full max-w-[400px] border-4 border-white/40 relative">
            
            <div className="absolute -top-3 -right-2 bg-teal-500 text-white text-xs md:text-sm font-bold px-3 py-1 md:px-4 md:py-1.5 rounded-full shadow-lg z-10">
              {(problemCount % 20) + 1} / 20
            </div>

            <div className="flex justify-between items-center mb-4 bg-gray-50 rounded-xl md:rounded-2xl p-3 md:p-4 shadow-inner border border-gray-100">
              <div className="flex items-center gap-2 md:gap-3">
                <div className="bg-yellow-100 p-1.5 md:p-2 rounded-lg text-yellow-600 shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M6 9H4.5a2.5 2.5 0 0 1 0-5H6"/><path d="M18 9h1.5a2.5 2.5 0 0 0 0-5H18"/><path d="M4 22h16"/><path d="M10 14.66V17c0 1.1-.9 2-2 2H4"/><path d="M14 14.66V17c0 1.1.9 2 2 2h8"/><path d="M18 2H6v7c0 3.31 2.69 6 6 6s6-2.69 6-6V2Z"/></svg>
                </div>
                <div>
                  <div className="text-[10px] md:text-xs text-gray-500 font-bold">점수</div>
                  <div className="text-lg md:text-xl font-black text-gray-800">{score}</div>
                </div>
              </div>
              
              <div className="flex flex-col items-center">
                <div className="text-[9px] md:text-[10px] text-teal-400 font-bold tracking-wider">LEVEL</div>
                <div className="flex items-center gap-1 text-xl md:text-2xl font-black text-teal-600 drop-shadow-sm">
                  <svg xmlns="http://www.w3.org/2000/svg" width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M7.21 15 2.66 7.14a2 2 0 0 1 .13-2.2L4.4 2.8A2 2 0 0 1 6 2h12a2 2 0 0 1 1.6.8l1.6 2.14a2 2 0 0 1 .14 2.2L16.79 15"/><path d="M11 12 5.12 2.2"/><path d="m13 12 5.88-9.8"/><path d="M8 7h8"/><circle cx="12" cy="17" r="5"/><path d="M12 18v-2h-.5"/></svg>{level}
                </div>
              </div>

              <div className="text-right">
                <div className="text-[10px] md:text-xs text-gray-500 font-bold">콤보</div>
                <div className={`text-lg md:text-xl font-black transition-colors ${combo > 2 ? 'text-rose-500 animate-pulse' : 'text-orange-500'}`}>
                  {combo} 연속
                </div>
              </div>
            </div>

            <p className="text-center font-bold text-gray-700 mb-4 text-sm px-2 break-keep">
              대칭축을 기준으로 선대칭도형을 완성해 보세요.
            </p>
            
            <div className="relative w-full aspect-square bg-blue-50/50 rounded-2xl border-2 border-blue-100 mb-4 overflow-hidden shadow-inner">
                 <svg 
                    viewBox="0 0 100 100" 
                    className="absolute inset-0 w-full h-full z-20 touch-none"
                    onPointerDown={handleGridClick}
                 >
                    <g className="opacity-30">
                        {Array.from({length: 11}).map((_, i) => (
                            <React.Fragment key={`grid-${i}`}>
                                <line x1={i * 10} y1="0" x2={i * 10} y2="100" stroke="#3b82f6" strokeWidth="0.5" />
                                <line x1="0" y1={i * 10} x2="100" y2={i * 10} stroke="#3b82f6" strokeWidth="0.5" />
                            </React.Fragment>
                        ))}
                    </g>

                    {problem.axisType === 0 && <line x1="50" y1="0" x2="50" y2="100" stroke="#ec4899" strokeWidth="1.5" />}
                    {problem.axisType === 1 && <line x1="0" y1="50" x2="100" y2="50" stroke="#ec4899" strokeWidth="1.5" />}
                    {problem.axisType === 2 && <line x1="100" y1="0" x2="0" y2="100" stroke="#ec4899" strokeWidth="1.5" />}
                    {problem.axisType === 3 && <line x1="0" y1="0" x2="100" y2="100" stroke="#ec4899" strokeWidth="1.5" />}

                    <polyline 
                        points={problem.points.map(p => `${p.x * 10},${p.y * 10}`).join(' ')} 
                        stroke="#333" 
                        strokeWidth="1.2" 
                        fill="none" 
                        strokeLinecap="round" 
                        strokeLinejoin="round" 
                    />
                    {problem.points.map((p, i) => (
                        <circle key={`op-${i}`} cx={p.x * 10} cy={p.y * 10} r="2" fill="#333" />
                    ))}

                    {userPath.length > 0 && (
                        <polyline 
                            points={userPath.map(p => `${p.x * 10},${p.y * 10}`).join(' ')} 
                            stroke="#3b82f6" 
                            strokeWidth="1.2" 
                            fill="none" 
                            strokeLinecap="round" 
                            strokeLinejoin="round" 
                        />
                    )}
                    {userPath.map((p, i) => (
                        <circle key={`up-${i}`} cx={p.x * 10} cy={p.y * 10} r="2" fill="#3b82f6" />
                    ))}
                 </svg>
            </div>

            <div className="text-center h-8 mb-2 font-bold text-lg flex items-center justify-center">
              {feedback === 'wrong' && <span className="text-red-500 animate-pulse flex items-center gap-1"><span className="text-xl">❌</span> 다시 생각해 봐.</span>}
              {feedback === 'correct' && <span className="text-green-500 flex items-center gap-1 bg-green-50 px-4 py-1 rounded-full"><span className="text-xl">✅</span> 정답!</span>}
            </div>

            <div className="grid grid-cols-4 gap-2">
                <button onClick={() => setUserPath([])} className="bg-gray-100 p-3 rounded-2xl font-bold flex justify-center items-center text-gray-600 hover:bg-gray-200 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="m7 21-4.3-4.3c-1-1-1-2.5 0-3.4l9.6-9.6c1-1 2.5-1 3.4 0l5.6 5.6c1 1 1 2.5 0 3.4L13 21"/><path d="M22 21H7"/><path d="m5 11 9 9"/></svg>
                </button>
                <button onClick={() => setUserPath(prev => prev.slice(0, -1))} className="bg-gray-100 p-3 rounded-2xl font-bold flex justify-center items-center text-gray-600 hover:bg-gray-200 active:scale-95 transition-all">
                    <svg xmlns="http://www.w3.org/2000/svg" width="22" height="22" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2" strokeLinecap="round" strokeLinejoin="round"><path d="M3 7v6h6"/><path d="M21 17a9 9 0 0 0-9-9 9 9 0 0 0-6 2.3L3 13"/></svg>
                </button>
                <button onClick={() => setGameState('gameOver')} className="bg-gray-100 p-3 rounded-2xl font-bold text-gray-600 hover:bg-gray-200 active:scale-95 transition-all">
                    종료
                </button>
                <button onClick={checkAnswer} disabled={userPath.length < 2 || feedback === 'correct'} className="bg-emerald-500 disabled:bg-emerald-300 text-white p-3 rounded-2xl font-bold shadow-md hover:bg-emerald-600 active:scale-95 transition-all flex justify-center items-center">
                    확인
                </button>
            </div>
          </div>
        </div>
      );
    }

    const root = ReactDOM.createRoot(document.getElementById('root'));
    root.render(<App />);
  </script>
</body>
</html>
